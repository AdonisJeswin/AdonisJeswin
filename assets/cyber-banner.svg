<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050814"/>
      <stop offset="50%" stop-color="#0b0f19"/>
      <stop offset="100%" stop-color="#02050c"/>
    </linearGradient>
    
    <!-- Neon Cyan Glow -->
    <filter id="cyanGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Neon Pink Glow -->
    <filter id="pinkGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1f293d" stroke-width="1" opacity="0.3"/>
    </pattern>
  </defs>

  <style>
    /* Keyframe Animations */
    @keyframes spinCW {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes spinCCW {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.9; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    
    /* Animation Classes */
    .spin-cw { transform-origin: 620px 175px; animation: spinCW 25s linear infinite; }
    .spin-ccw { transform-origin: 620px 175px; animation: spinCCW 15s linear infinite; }
    .pulse-glow { animation: pulse 3s ease-in-out infinite; }
    .float-anim { animation: float 6s ease-in-out infinite; }
    .cursor-blink { animation: blink 1s step-end infinite; }
    
    /* Hover Effects */
    .hud-group:hover .spin-cw { animation-duration: 5s; }
    .hud-group:hover .spin-ccw { animation-duration: 3s; }
    .hud-group:hover circle { stroke-width: 2px; filter: url(#cyanGlow); }
    .hud-group:hover .hud-core { fill: #ff0844; filter: url(#pinkGlow); }
    
    /* Fonts and Text */
    .term-text {
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      fill: #e2e8f0;
    }
    .accent-cyan { fill: #00f2fe; }
    .accent-pink { fill: #ff0844; }
  </style>

  <!-- Background -->
  <rect width="800" height="350" fill="url(#bgGrad)"/>
  <rect width="800" height="350" fill="url(#grid)"/>

  <!-- Grid Perspective Lines (3D effect at the bottom) -->
  <g opacity="0.4">
    <path d="M 0 350 L 800 350 M 0 340 L 800 340 M 0 320 L 800 320 M 0 290 L 800 290 M 0 250 L 800 250" stroke="#1e293b" stroke-width="1.5"/>
    <path d="M -100 200 L 0 350" stroke="#1f293d" stroke-width="1.5"/>
    <path d="M 100 200 L 150 350" stroke="#1f293d" stroke-width="1.5"/>
    <path d="M 300 200 L 400 350" stroke="#1f293d" stroke-width="1.5"/>
    <path d="M 500 200 L 650 350" stroke="#1f293d" stroke-width="1.5"/>
    <path d="M 700 200 L 900 350" stroke="#1f293d" stroke-width="1.5"/>
  </g>

  <!-- Holographic Circles / HUD (Right Side) -->
  <g class="hud-group" style="cursor: pointer;">
    <!-- Outer decorative ring -->
    <circle cx="620" cy="175" r="130" fill="none" stroke="#1e293b" stroke-width="1" stroke-dasharray="10 15"/>
    
    <!-- Rotating Ring 1 (Cyan, Outer) -->
    <circle class="spin-cw" cx="620" cy="175" r="110" fill="none" stroke="#00f2fe" stroke-width="1.5" stroke-dasharray="80 40 10 40" filter="url(#cyanGlow)" opacity="0.8"/>
    
    <!-- Rotating Ring 2 (Pink, Middle) -->
    <circle class="spin-ccw" cx="620" cy="175" r="90" fill="none" stroke="#ff0844" stroke-width="1.5" stroke-dasharray="50 30 100 40" filter="url(#pinkGlow)" opacity="0.8"/>
    
    <!-- Inner static circle -->
    <circle cx="620" cy="175" r="70" fill="none" stroke="#1e293b" stroke-width="2"/>
    
    <!-- Rotating Hexagon or inner shape -->
    <polygon class="spin-cw" points="620,125 663,150 663,200 620,225 577,200 577,150" fill="none" stroke="#00f2fe" stroke-width="1" opacity="0.6"/>
    
    <!-- Central Core (Glowing Pulsing Circle) -->
    <circle class="hud-core pulse-glow" cx="620" cy="175" r="25" fill="#00f2fe" opacity="0.8" filter="url(#cyanGlow)"/>
    <circle cx="620" cy="175" r="10" fill="#ffffff"/>
    
    <!-- Tech coordinates lines -->
    <line x1="620" y1="25" x2="620" y2="325" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="5 5"/>
    <line x1="470" y1="175" x2="770" y2="175" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="5 5"/>
  </g>

  <!-- Interactive Tech Details Overlay -->
  <g class="float-anim" opacity="0.7">
    <!-- Floating nodes -->
    <circle cx="480" cy="100" r="4" fill="#ff0844" filter="url(#pinkGlow)"/>
    <line x1="480" y1="100" x2="520" y2="120" stroke="#ff0844" stroke-width="0.5"/>
    <text x="525" y="123" font-family="monospace" font-size="10" fill="#ff0844">SYS_SEC: ACTIVE</text>

    <circle cx="730" cy="80" r="4" fill="#00f2fe" filter="url(#cyanGlow)"/>
    <line x1="730" y1="80" x2="700" y2="110" stroke="#00f2fe" stroke-width="0.5"/>
    <text x="645" y="120" font-family="monospace" font-size="10" fill="#00f2fe">NODE_01: ONLINE</text>

    <circle cx="500" cy="270" r="3" fill="#00f2fe" filter="url(#cyanGlow)"/>
    <line x1="500" y1="270" x2="540" y2="250" stroke="#00f2fe" stroke-width="0.5"/>
    <text x="545" y="248" font-family="monospace" font-size="10" fill="#00f2fe">SYS_MEM: 94.3%</text>
  </g>

  <!-- Typing Terminal Text (Left Side) -->
  <g transform="translate(50, 60)">
    <!-- Terminal Title Bar -->
    <rect x="-10" y="-30" width="360" height="25" rx="5" ry="5" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <circle cx="5" cy="-17" r="4" fill="#ff5f56"/>
    <circle cx="20" cy="-17" r="4" fill="#ffbd2e"/>
    <circle cx="35" cy="-17" r="4" fill="#27c93f"/>
    <text x="55" y="-14" font-family="monospace" font-size="10" fill="#8b949e">guest@terminal: ~</text>

    <!-- Typing lines using SVG clipPath or width animations -->
    <!-- Line 1 -->
    <g transform="translate(0, 20)">
      <clipPath id="clip1">
        <rect x="0" y="-15" width="340" height="25">
          <animate attributeName="width" values="0; 0; 340; 340" keyTimes="0; 0.05; 0.3; 1" dur="8s" repeatCount="indefinite"/>
        </rect>
      </clipPath>
      <text class="term-text" clip-path="url(#clip1)" font-size="14">
        <tspan fill="#ff0844">> </tspan>INIT SECURE_SHELL... <tspan fill="#00f2fe">DONE</tspan>
      </text>
    </g>

    <!-- Line 2 -->
    <g transform="translate(0, 50)">
      <clipPath id="clip2">
        <rect x="0" y="-15" width="340" height="25">
          <animate attributeName="width" values="0; 0.3; 0.3; 340; 340" keyTimes="0; 0.3; 0.35; 0.6; 1" dur="8s" repeatCount="indefinite"/>
        </rect>
      </clipPath>
      <text class="term-text" clip-path="url(#clip2)" font-size="16">
        <tspan fill="#ff0844">> </tspan>ACCESSING: <tspan fill="#ffffff">ADONIS JESWIN</tspan>
      </text>
    </g>

    <!-- Line 3 -->
    <g transform="translate(0, 80)">
      <clipPath id="clip3">
        <rect x="0" y="-15" width="340" height="25">
          <animate attributeName="width" values="0; 0.6; 0.65; 340; 340" keyTimes="0; 0.6; 0.65; 0.85; 1" dur="8s" repeatCount="indefinite"/>
        </rect>
      </clipPath>
      <text class="term-text" clip-path="url(#clip3)" font-size="14">
        <tspan fill="#ff0844">> </tspan>ROLE: <tspan fill="#00f2fe">SEC_ENG &amp; DEV</tspan>
      </text>
    </g>

    <!-- Line 4 -->
    <g transform="translate(0, 110)">
      <clipPath id="clip4">
        <rect x="0" y="-15" width="340" height="25">
          <animate attributeName="width" values="0; 0.85; 0.9; 340; 340" keyTimes="0; 0.85; 0.9; 0.98; 1" dur="8s" repeatCount="indefinite"/>
        </rect>
      </clipPath>
      <text class="term-text" clip-path="url(#clip4)" font-size="13">
        <tspan fill="#ff0844">> </tspan>SYS_STATUS: <tspan fill="#27c93f" class="pulse-glow">ACTIVE [127.0.0.1]</tspan>
      </text>
    </g>

    <!-- Blinking Cursor -->
    <g>
      <!-- We position it at the end of the text. To keep it blinking and floating, we can use simple translation animation -->
      <rect x="220" y="98" width="8" height="15" fill="#00f2fe" class="cursor-blink">
        <!-- Move cursor dynamically according to typing lines -->
        <animate attributeName="x" values="10; 180; 180; 220; 220; 250; 250; 280; 280" keyTimes="0; 0.3; 0.35; 0.6; 0.65; 0.85; 0.9; 0.98; 1" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="y" values="5; 5; 35; 35; 65; 65; 95; 95; 95" keyTimes="0; 0.3; 0.35; 0.6; 0.65; 0.85; 0.9; 0.98; 1" dur="8s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- Bottom tech stats status bar -->
  <rect x="30" y="295" width="740" height="1" fill="#1e293b"/>
  <text x="40" y="315" font-family="monospace" font-size="11" fill="#4facfe" class="pulse-glow">⚡ CONNECTED TO SECURE SERVER</text>
  <text x="760" y="315" font-family="monospace" font-size="11" fill="#64748b" text-anchor="end">LOC: MUMBAI, IN // LATENCY: 12ms</text>
</svg>
